name: Build Kivy App to APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      - name: Update package lists
        run: sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt-get install -y -o Acquire::Retries=3 \
            python3-pip \
            python3-setuptools \
            python3-dev \
            build-essential \
            libssl-dev \
            libffi-dev \
            cython3 \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-tools \
            gstreamer1.0-x \
            gstreamer1.0-alsa \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-gtk3 \
            gstreamer1.0-gl \
            gstreamer1.0-qt5 \
            gstreamer1.0-opencv \
            openjdk-8-jdk \
            unzip \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline6-dev \
            libffi-dev \
            libsqlite3-dev \
            libgdbm-dev \
            libdb-dev \
            libbz2-dev \
            libexpat1-dev \
            liblzma-dev \
            tk-dev \
            libgdbm-compat-dev \
            libatlas-base-dev \
            libopenjp2-7-dev \
            libqt5gui5 \
            libqt5webkit5 \
            libqt5test5

      - name: Install buildozer and cython
        run: |
          pip install buildozer
          pip install Cython

      - name: Set up environment variables
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$HOME/android-sdk/build-tools/31.0.0" >> $GITHUB_ENV

      - name: Install Android SDK Command-line Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-6858069_latest.zip
          unzip commandlinetools-linux-6858069_latest.zip -d latest
          mv latest/cmdline-tools latest/tools
          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/tools/bin

      - name: Accept Android SDK licenses
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/tools/bin/sdkmanager --licenses

      - name: Download and install libjasper
        run: |
          wget https://github.com/jasper-software/jasper/archive/version-2.0.25.zip
          unzip version-2.0.25.zip
          cd jasper-version-2.0.25
          mkdir -p build
          cd build
          cmake ..
          make
          sudo make install

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
